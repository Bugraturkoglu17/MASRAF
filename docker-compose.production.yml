name: masraf-production

# Production veritabanı bu compose içinde çalıştırılmaz. DATABASE_URL ve
# DIRECT_URL Northflank Secret Group üzerinden Neon'a bağlanır.
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    environment:
      NODE_ENV: production
      APP_ENVIRONMENT: production
      PORT: 4000
    env_file:
      - path: .env
        required: false
    expose:
      - '4000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health/ready']
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: /api/v1
        VITE_APP_ENVIRONMENT: production
        VITE_APP_VERSION: ${APP_VERSION:-0.1.0}
    restart: always
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m,noexec,nosuid
      - /var/run:size=8m,noexec,nosuid
      - /var/log/nginx:size=16m,noexec,nosuid
      - /tmp:size=16m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    environment:
      API_INTERNAL_URL: http://api:4000
    ports:
      - '8080:8080'
    depends_on:
      api:
        condition: service_healthy
