# Üretim benzeri çalıştırma (kendi sunucunuz / VPS için).
# Northflank gibi platformlarda her servis ayrı ayrı, bu dosya olmadan
# yapılandırılır (bkz. docs/northflank-setup.md). MinIO burada YOKTUR;
# üretimde gerçek bir S3 uyumlu sağlayıcı (R2, S3, B2) kullanılmalıdır.
name: masraf-production

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - '4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: always
    ports:
      - '80:8080'
    depends_on:
      - api

volumes:
  postgres-data:
