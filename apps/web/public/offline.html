<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Çevrimdışı - Masraf Yönetim Sistemi</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #f8fafc;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        text-align: center;
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
      }
      .card {
        max-width: 360px;
        padding: 28px 22px;
        border: 1px solid #334155;
        border-radius: 20px;
        background: #1e293b;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      }
      .icon {
        width: 58px;
        height: 58px;
        margin: 0 auto 16px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: #334155;
        font-size: 28px;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 8px;
      }
      p {
        color: #cbd5e1;
        line-height: 1.5;
      }
      button {
        margin-top: 20px;
        min-height: 44px;
        padding: 10px 20px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #2563eb;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">⌁</div>
      <h1>İnternet bağlantısı bulunamadı</h1>
      <p>
        Bağlantınızı kontrol edin. Güvenli işlemler ve güncel masraf verileri için internet
        bağlantısı gereklidir.
      </p>
      <button onclick="location.reload()">Tekrar Dene</button>
    </div>
  </body>
</html>
