<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Çevrimdışı - Masraf Yönetim Sistemi</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #f8fafc;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 360px;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 8px;
      }
      p {
        color: #cbd5e1;
        line-height: 1.5;
      }
      button {
        margin-top: 20px;
        padding: 10px 20px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #2563eb;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>İnternet bağlantısı yok</h1>
      <p>
        Şu anda çevrimdışısınız. Uygulama kabuğu önbellekten yüklendi, ancak masraf oluşturma ve
        güncel veriler için internet bağlantısı gereklidir.
      </p>
      <button onclick="location.reload()">Yeniden dene</button>
    </div>
  </body>
</html>
