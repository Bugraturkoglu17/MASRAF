server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Service worker ve manifest her zaman yeniden doğrulanmalı; eski
    # sürümün önbellekte takılı kalmasını (güncelleme bildiriminin
    # gelmemesi) önler.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /offline.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Hash'lenmiş build çıktıları uzun süre önbelleklenebilir.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: React Router istemci taraflı yönlendirme yapar.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
