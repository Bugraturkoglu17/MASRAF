server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Sıkıştırma ────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # ── Güvenlik başlıkları ────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header X-Frame-Options           "DENY"                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header X-XSS-Protection          "1; mode=block"                      always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── API proxy (Northflank iç ağ / Docker iç ağ) ───────────────────────────
    # VITE_API_URL=/api/v1 olarak ayarlandığında tarayıcı bu prefix'e istek atar.
    # Nginx bu istekleri API servisine yönlendirir; böylece API'nin public domain'i gerekmez.
    # API_INTERNAL_URL: Northflank'te http://<servis-adı>:<port>, lokal dev'de http://api:4000
    location /api/ {
        proxy_pass        http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_set_header  Upgrade           $http_upgrade;
        proxy_set_header  Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Health check (Northflank probe'u için) ─────────────────────────────────
    location /health {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── PWA dosyaları ──────────────────────────────────────────────────────────
    # Service worker ve manifest hiçbir zaman önbelleklenmemeli.
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /offline.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Hash'li build çıktıları uzun süre önbelleklenebilir (immutable).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback (React Router) ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
