# Lokal geliştirme ortamı.
# Üretim için docker-compose.production.yml kullanılır (Neon + R2 bağlantıları .env'den gelir).
name: masraf

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-masraf}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${R2_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${R2_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${R2_ACCESS_KEY_ID:-minioadmin} ${R2_SECRET_ACCESS_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${R2_BUCKET:-masraf-attachments}
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-masraf}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-masraf}?schema=public
      R2_ENDPOINT: http://minio:9000
      R2_FORCE_PATH_STYLE: 'true'
      WEB_URL: http://localhost:3000
      API_URL: http://localhost:4000
    ports:
      - '${API_PORT:-4000}:4000'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Lokal dev'de tarayıcı doğrudan API'ye gider (Nginx proxy yok)
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api/v1}
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:8080'
    # API_INTERNAL_URL: Northflank iç ağda api servisinin adresi
    # Lokal dev'de bu değer kullanılmaz (VITE_API_URL build-time'da gömülür)
    environment:
      API_INTERNAL_URL: http://api:4000
    depends_on:
      - api

volumes:
  postgres-data:
  minio-data:
